openapi: 3.0.3
info:
  title: Bamdul Reminder API
  description: Apple Reminder 스타일 웹 리마인더 애플리케이션 API
  version: 1.0.0

servers:
  - url: http://localhost:8081/api
    description: Local development server

paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupCommand'
      responses:
        '201':
          description: 가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '409':
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCommand'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /lists:
    get:
      tags: [ReminderList]
      summary: 전체 목록 조회
      operationId: findAllLists
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderListResult'
        '401':
          description: 인증 필요

    post:
      tags: [ReminderList]
      summary: 목록 생성
      operationId: createList
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderListCommand'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResult'
        '401':
          description: 인증 필요

  /lists/{id}:
    get:
      tags: [ReminderList]
      summary: 목록 단건 조회
      operationId: findListById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResult'
        '401':
          description: 인증 필요
        '404':
          description: 목록을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    put:
      tags: [ReminderList]
      summary: 목록 수정
      operationId: updateList
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderListCommand'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResult'
        '401':
          description: 인증 필요
        '404':
          description: 목록을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      tags: [ReminderList]
      summary: 목록 삭제
      operationId: deleteList
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '204':
          description: 삭제 성공
        '401':
          description: 인증 필요
        '404':
          description: 목록을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /lists/reorder:
    patch:
      tags: [ReminderList]
      summary: 목록 순서 변경
      operationId: reorderLists
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderCommand'
      responses:
        '204':
          description: 순서 변경 성공
        '401':
          description: 인증 필요

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ListId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 목록 ID

  schemas:
    SignupCommand:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: password123
        name:
          type: string
          example: 홍길동

    LoginCommand:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123

    AuthResult:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        member:
          $ref: '#/components/schemas/MemberResult'

    MemberResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: 홍길동
        createdAt:
          type: string
          format: date-time

    ReminderListResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 업무
        color:
          type: string
          example: '#FF6B6B'
        icon:
          type: string
          example: briefcase
        sortOrder:
          type: integer
          example: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateReminderListCommand:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: 업무
        color:
          type: string
          example: '#FF6B6B'
        icon:
          type: string
          example: briefcase
        sortOrder:
          type: integer
          example: 0

    UpdateReminderListCommand:
      type: object
      properties:
        name:
          type: string
          example: 개인
        color:
          type: string
          example: '#4A90D9'
        icon:
          type: string
          example: person

    ReorderCommand:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int64
          example: [3, 1, 2]

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
